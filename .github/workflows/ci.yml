name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Secret hygiene — must pass before anything else.
  # ------------------------------------------------------------------
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          # Required since gitleaks-action v2's breaking change: the action
          # needs a token to fetch PR commits for scanning.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # ------------------------------------------------------------------
  # Python oracle
  # ------------------------------------------------------------------
  oracle:
    name: Oracle (Python)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: oracle } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install (mock backend)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Ruff
        run: ruff check tabula_oracle tests
      - name: Pytest (mock backend)
        env:
          TABULA_ORACLE_MOCK: "1"
        run: pytest --cov=tabula_oracle --cov-report=term-missing

  # ------------------------------------------------------------------
  # Keeper + frontend
  # ------------------------------------------------------------------
  node:
    name: Keeper + Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            keeper/package.json
            app/package.json
      - name: Keeper — install + typecheck
        run: |
          cd keeper
          npm install --no-audit --no-fund
          npx tsc --noEmit
      - name: Frontend — install + build
        run: |
          cd app
          npm install --no-audit --no-fund
          npm run build --if-present

  # ------------------------------------------------------------------
  # Anchor programs
  # ------------------------------------------------------------------
  anchor:
    name: Anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      # `stable` (not a pinned 1.79) is required: `cargo install anchor-cli`
      # now pulls transitive crates that use edition2024, which needs Cargo
      # >= 1.85. The on-chain program itself is built by cargo-build-sbf with
      # Solana's bundled toolchain, so the host toolchain only affects the
      # anchor-cli build, IDL generation, and the host-target `cargo check`.
      - uses: actions-rs/toolchain@v1
        with: { toolchain: stable, profile: minimal, override: true }
      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked
      - name: Build (mock-txline)
        run: anchor build
      - name: Build (real-txline)
        run: |
          cd programs/tabula-markets
          cargo check --no-default-features --features real-txline

  # ------------------------------------------------------------------
  # Docker images
  # ------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [oracle, node]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build oracle image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: oracle/Dockerfile
          push: false
          tags: tabula-oracle:ci
      - name: Build keeper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: keeper/Dockerfile
          push: false
          tags: tabula-keeper:ci
