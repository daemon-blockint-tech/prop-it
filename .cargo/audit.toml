# cargo-audit configuration for TabulaMarkets.
#
# RUSTSEC-2024-0344 (curve25519-dalek) and RUSTSEC-2022-0093 (ed25519-dalek)
# are transitive via Solana 1.18 / Anchor 0.30. Forcing a newer dalek breaks
# the Solana BPF toolchain. Clear these ignores when upgrading Anchor past
# the Solana release that vendors fixed dalek crates.

[advisories]
ignore = [
    "RUSTSEC-2024-0344",
    "RUSTSEC-2022-0093",
]
